<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coconet | Portal Viewport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c0f;
        }

        /* Sidebar Styling with Autohide (Desktop) */
        #sidebar {
            width: 72px;
            height: 100vh;
            background-color: rgba(11, 12, 15, 0.9);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Desktop Autohide logic */
        @media (min-width: 768px) {
            #sidebar {
                transform: translateX(-64px); 
            }
            #sidebar:hover {
                transform: translateX(0);
                background-color: #0b0c0f;
                box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
            }
        }

        /* Mobile specific styling */
        @media (max-width: 767px) {
            #sidebar {
                width: 80px;
                transform: translateX(-100%);
                background-color: #0b0c0f;
            }
            body.sidebar-open #sidebar {
                transform: translateX(0);
                box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            }
            #mobile-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.6);
                backdrop-filter: blur(4px);
                z-index: 90;
            }
            body.sidebar-open #mobile-overlay {
                display: block;
            }
        }

        /* Nav Item styling */
        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            border-radius: 16px;
            color: #81838d;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
        }

        @media (min-width: 768px) {
            .nav-item {
                margin-left: 64px; 
                transform: translateX(-32px);
            }
            #sidebar:hover .nav-item {
                margin-left: 0;
                transform: translateX(0);
            }
        }

        .nav-item:hover, .nav-item.active {
            color: white;
        }

        .nav-item.active {
            background-color: #E21E26;
            box-shadow: 0 4px 15px rgba(226, 30, 38, 0.4);
        }

        /* Tooltip Labels */
        .nav-label {
            position: absolute;
            left: 80px;
            background: #1c1e25;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .nav-item:hover .nav-label {
            opacity: 1;
            transform: translateX(0);
        }

        /* Viewport Frame */
        #main-viewport {
            width: 100%;
            height: 100vh;
            border: none;
            background: #000;
        }

        /* Mobile Menu Button */
        #mobile-toggle {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 56px;
            height: 56px;
            border-radius: 20px;
            background: #E21E26;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 110;
            box-shadow: 0 8px 25px rgba(226, 30, 38, 0.4);
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        #mobile-toggle:active { transform: scale(0.9); }
        @media (min-width: 768px) { #mobile-toggle { display: none; } }
    </style>
</head>
<body class="selection:bg-[#E21E26]/30">

    <!-- CONTENT VIEWPORT -->
    <iframe id="main-viewport" name="content-frame" src="https://edzdamangere.github.io/tikidemo.github.io/"></iframe>

    <script>
        function handleNavClick(element) {
            // Remove active class from all items
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => item.classList.remove('active'));
            
            // Add active class to clicked item
            element.classList.add('active');

            // On mobile, close sidebar after selection
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
        }

        function toggleSidebar() {
            document.body.classList.toggle('sidebar-open');
        }
    </script>
</body>
</html>
