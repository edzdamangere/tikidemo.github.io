<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coconet | 404 Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b4e5a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #81838d; }

        body {
            background-color: #0b0c0f;
            color: #f9f9f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Viewport lock for cinematic effect */
        }

        @media (max-height: 700px), (max-width: 1024px) {
            body { overflow: auto; }
        }

        .nav-pill { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-pill:hover:not(.active-pill) {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        /* Brand Red Implementation */
        .active-pill {
            background-color: #E21E26 !important;
            color: white !important;
            box-shadow: 0 4px 14px 0 rgba(226, 30, 38, 0.3);
        }

        #logo-text { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Subtle drift animation for the error text */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .float-anim { animation: float 8s ease-in-out infinite; }
    </style>
</head>
<body class="bg-[#0b0c0f] text-[#f9f9f9] font-sans antialiased selection:bg-white/30 relative">

    <!-- FULL SCREEN HERO BACKGROUND -->
    <div id="parallax-bg" class="fixed top-0 left-0 w-full h-full z-0 pointer-events-none overflow-hidden bg-black">
        <!-- Vast, empty ocean theme to fit the 404 context -->
        <img src="https://images.unsplash.com/photo-1439405326854-014607f694d7?q=80&w=1920&auto=format&fit=crop" 
             alt="Vast Ocean Horizon" 
             class="absolute inset-0 w-full h-full object-cover opacity-60 brightness-[0.4] saturate-[1.2]">
        
        <!-- Gradient overlays for depth -->
        <div class="absolute inset-0 bg-gradient-to-b from-[#0b0c0f]/80 via-transparent to-[#0b0c0f] w-full z-20"></div>
    </div>

    <!-- Dynamic Sticky Navigation -->
    <div class="fixed top-0 left-0 w-full flex justify-center py-6 z-[100] px-4 pointer-events-none">
        <div id="master-nav" class="flex items-center bg-[#1c1e25]/80 backdrop-blur-xl rounded-full p-[4px] border border-white/10 shadow-2xl overflow-hidden pointer-events-auto transition-all duration-500">
            <div id="logo-container" class="flex items-center h-full shrink-0">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shrink-0 ml-[2px] shadow-sm border border-white/20">
                    <span class="text-[#E21E26] font-black text-lg">C</span>
                </div>
                <div id="logo-text" class="flex flex-col justify-center ml-3 pr-6 overflow-hidden max-w-[200px] opacity-100">
                    <span class="text-white font-bold leading-none tracking-tighter text-sm whitespace-nowrap uppercase">The Coconet</span>
                    <span class="text-[8px] uppercase tracking-[0.2em] text-gray-400 mt-0.5 whitespace-nowrap">Productions</span>
                </div>
            </div>
            <div id="nav-divider" class="h-6 w-[1px] bg-white/10 mx-2"></div>
            <div id="menu-container" class="flex items-center space-x-1 sm:space-x-2 px-2">
                <button class="nav-pill text-gray-300 hover:text-white px-4 py-1.5 rounded-full text-[12px] sm:text-[13px] font-bold tracking-wide flex items-center shrink-0">
                    <span>Home</span>
                </button>
                <button class="nav-pill text-gray-300 hover:text-white px-4 py-1.5 rounded-full text-[12px] sm:text-[13px] font-bold tracking-wide flex items-center shrink-0">
                    <span>Stories</span>
                </button>
                <button class="nav-pill text-gray-300 hover:text-white px-4 py-1.5 rounded-full text-[12px] sm:text-[13px] font-bold tracking-wide flex items-center shrink-0">
                    <span>Documentaries</span>
                </button>
                <button class="nav-pill text-gray-300 hover:text-white px-4 py-1.5 rounded-full text-[12px] sm:text-[13px] font-bold tracking-wide flex items-center shrink-0">
                    <span>Contact</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content: Viewport Centered -->
    <main class="relative z-30 w-full min-h-screen flex flex-col justify-center items-center px-10 text-center">
        <div class="flex flex-col items-center space-y-6 float-anim">
            <span class="text-xl sm:text-2xl font-bold uppercase tracking-[0.4em] text-white opacity-60 drop-shadow-md">Beyond the Horizon</span>
            
            <!-- Ultra bold error title -->
            <h1 class="text-[8rem] sm:text-[12rem] lg:text-[18rem] font-black uppercase tracking-tighter leading-[0.7] text-white drop-shadow-2xl">
                404
            </h1>
            
            <div class="max-w-2xl space-y-8 mt-4">
                <p class="text-2xl sm:text-4xl font-light uppercase tracking-widest text-white/90">
                    Talofae, she's not here!
                </p>
                <p class="text-base sm:text-lg text-gray-400 font-light leading-relaxed">
                    The story you are looking for has drifted off course. The vastness of the Pacific is beautiful, but sometimes things get lost in the current.
                </p>
                
                <div class="pt-8">
                    <!-- CTA to return home using Brand Red -->
                    <a href="index.html" class="inline-block bg-[#E21E26] hover:bg-[#c41a20] text-white px-12 py-4 rounded-full font-bold uppercase tracking-[0.2em] text-sm shadow-xl shadow-red-900/30 transition-all hover:scale-105 active:scale-95">
                        Return to Shore
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="fixed bottom-0 left-0 w-full text-gray-500 text-[11px] text-center py-8 z-30">
        <p class="tracking-widest opacity-40 uppercase">© 2026 Tikilounge Productions / The Coconet TV</p>
    </footer>

</body>
</html>
